name: iosApp

options:
  createIntermediateGroups: true
  deploymentTarget:
    iOS: "15.0"

configs:
  Debug: debug
  Release: release

settings:
  configFiles:
    Debug: Configuration/Config.xcconfig
    Release: Configuration/Config.xcconfig

targets:
  iosApp:
    type: application
    platform: iOS
    deploymentTarget: "15.0"
    configFiles:
      Debug: Pods/Target Support Files/Pods-iosApp/Pods-iosApp.debug.xcconfig
      Release: Pods/Target Support Files/Pods-iosApp/Pods-iosApp.release.xcconfig
    sources:
      - path: iosApp
        excludes:
          - Info.plist
          - BiteSizeReader.entitlements
      - path: SharedSupport
        includes:
          - AppGroupContract.swift
    settings:
      base:
        PRODUCT_NAME: BiteSizeReader
        PRODUCT_BUNDLE_IDENTIFIER: com.po4yka.bitesizereader
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: Apple Development
        DEVELOPMENT_TEAM: "$(TEAM_ID)"
        CODE_SIGN_ENTITLEMENTS: iosApp/BiteSizeReader.entitlements
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: iosApp/Info.plist
        DEVELOPMENT_ASSET_PATHS: "\"iosApp/Preview Content\""
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@executable_path/Frameworks"
        OTHER_LDFLAGS:
          - "$(inherited)"
          - "-lsqlite3"
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1,2"
      configs:
        Debug:
          ENABLE_PREVIEWS: YES
          ONLY_ACTIVE_ARCH: YES
        Release:
          ENABLE_PREVIEWS: YES
          SWIFT_COMPILATION_MODE: wholemodule
    preBuildScripts:
      - name: Compile Kotlin Frameworks
        shell: /bin/sh
        script: |
          if [ "YES" = "$OVERRIDE_KOTLIN_BUILD_IDE_SUPPORTED" ]; then
            echo "Skipping Gradle build task invocation due to OVERRIDE_KOTLIN_BUILD_IDE_SUPPORTED environment variable set to \"YES\""
            exit 0
          fi
          cd "$SRCROOT/.."
          ./gradlew :composeApp:syncFramework \
            -Pkotlin.native.cocoapods.platform="$PLATFORM_NAME" \
            -Pkotlin.native.cocoapods.archs="$ARCHS" \
            -Pkotlin.native.cocoapods.configuration="$CONFIGURATION"
    dependencies:
      - target: ShareExtension
        embed: true
        codeSign: true
      - target: RecentSummariesWidget
        embed: true
        codeSign: true

  ShareExtension:
    type: app-extension
    platform: iOS
    deploymentTarget: "15.0"
    sources:
      - path: ShareExtension
        excludes:
          - Info.plist
          - ShareExtension.entitlements
          - Base.lproj/MainInterface.storyboard
      - path: SharedSupport
        includes:
          - AppGroupContract.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.po4yka.bitesizereader.shareextension
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: Apple Development
        DEVELOPMENT_TEAM: "$(TEAM_ID)"
        CODE_SIGN_ENTITLEMENTS: ShareExtension/ShareExtension.entitlements
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: ShareExtension/Info.plist
        APPLICATION_EXTENSION_API_ONLY: YES
        SKIP_INSTALL: YES
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@executable_path/Frameworks"
          - "@executable_path/../../Frameworks"
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1,2"

  RecentSummariesWidget:
    type: app-extension
    platform: iOS
    deploymentTarget: "15.0"
    sources:
      - path: RecentSummariesWidget
        excludes:
          - Info.plist
          - RecentSummariesWidget.entitlements
      - path: SharedSupport
        includes:
          - AppGroupContract.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.po4yka.bitesizereader.widget
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: Apple Development
        DEVELOPMENT_TEAM: "$(TEAM_ID)"
        CODE_SIGN_ENTITLEMENTS: RecentSummariesWidget/RecentSummariesWidget.entitlements
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: RecentSummariesWidget/Info.plist
        APPLICATION_EXTENSION_API_ONLY: YES
        SKIP_INSTALL: YES
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@executable_path/Frameworks"
          - "@executable_path/../../Frameworks"
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1,2"
