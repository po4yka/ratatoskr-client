name: Dependency CVE scan

on:
  # Weekly schedule keeps the NVD-vs-build comparison fresh without
  # blocking PRs on every push.
  schedule:
    - cron: '0 6 * * 1' # Mondays at 06:00 UTC
  # Also run when something in the dependency graph or build classpath
  # changes — those are the PRs most likely to introduce a new CVE.
  pull_request:
    paths:
      - 'gradle/libs.versions.toml'
      - '**/build.gradle.kts'
      - 'gradle/wrapper/gradle-wrapper.properties'
      - 'build-logic/**'
      - 'dependency-check-suppressions.xml'
      - '.github/workflows/dependency-check.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scan:
    name: OWASP dependency-check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-home-cache-cleanup: true
          cache-encryption-key: ${{ secrets.GRADLE_CACHE_ENCRYPTION_KEY }}

      # Cache the NVD database between runs. The plugin downloads ~1 GB
      # of feeds on first run; subsequent runs only fetch deltas.
      - name: Cache NVD database
        uses: actions/cache@v5
        with:
          path: ~/.gradle/dependency-check-data
          key: nvd-data-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            nvd-data-${{ runner.os }}-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run dependency-check
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: ./gradlew dependencyCheckAggregate --no-daemon

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: dependency-check-report
          path: |
            build/reports/dependency-check-report.html
            build/reports/dependency-check-report.sarif
            build/reports/dependency-check-report.json
          retention-days: 30

      - name: Publish SARIF to code scanning
        if: always() && github.event_name != 'pull_request'
        uses: github/codeql-action/upload-sarif@v4
        continue-on-error: true
        with:
          sarif_file: build/reports/dependency-check-report.sarif
          category: dependency-check
