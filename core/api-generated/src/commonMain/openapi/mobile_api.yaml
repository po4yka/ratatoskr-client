openapi: 3.1.0
info:
  title: Ratatoskr Mobile API
  description: RESTful API for Android/iOS mobile clients
  version: 1.0.0
servers:
- url: https://ratatoskrapi.po4yka.com
  description: Production
- url: https://staging-ratatoskrapi.po4yka.com
  description: Staging
- url: http://localhost:8000
  description: Local development
paths:
  /v1/auth/telegram-login:
    post:
      tags:
      - Authentication
      summary: Telegram Login
      description: 'Exchange Telegram authentication data for JWT tokens.


        Verifies Telegram auth hash using HMAC-SHA256 and returns access + refresh tokens.


        The authentication data must come from Telegram Login Widget and include:

        - id: Telegram user ID

        - hash: HMAC-SHA256 hash of auth data

        - auth_date: Unix timestamp of authentication

        - client_id: Client application ID

        - Optional: username, first_name, last_name, photo_url'
      operationId: telegram_login_v1_auth_telegram_login_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TelegramLoginRequest'
        required: true
      responses:
        '200':
          description: Login success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponseEnvelope'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '422':
          $ref: '#/components/responses/ValidationError'
        '429':
          $ref: '#/components/responses/TooManyRequestsError'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/auth/refresh:
    post:
      tags:
      - Authentication
      summary: Refresh Access Token
      description: Refresh an expired access token using a refresh token.
      operationId: refresh_access_token_v1_auth_refresh_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
        required: true
      responses:
        '200':
          description: Tokens refreshed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokensResponseEnvelope'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '422':
          $ref: '#/components/responses/ValidationError'
        '429':
          $ref: '#/components/responses/TooManyRequestsError'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/auth/logout:
    post:
      tags:
      - Authentication
      summary: Logout
      description: Revoke the specified refresh token.
      operationId: logout_v1_auth_logout_post
      security:
      - HTTPBearer: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
        required: true
      responses:
        '200':
          description: Logout successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/auth/sessions:
    get:
      tags:
      - Authentication
      summary: List Active Sessions
      description: List all active refresh token sessions for the current user.
      operationId: list_sessions_v1_auth_sessions_get
      security:
      - HTTPBearer: []
      responses:
        '200':
          description: List of sessions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionListResponseEnvelope'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/auth/me:
    get:
      tags:
      - Authentication
      summary: Get Current User Info
      description: Get current authenticated user information.
      operationId: get_current_user_info_v1_auth_me_get
      responses:
        '200':
          description: Current user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponseEnvelope'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
      - HTTPBearer: []
    delete:
      tags:
      - Authentication
      summary: Delete Account
      description: Delete the current user account and all associated data.
      operationId: delete_account_v1_auth_me_delete
      security:
      - HTTPBearer: []
      responses:
        '200':
          description: Account deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/summaries/{summary_id}/favorite:
    post:
      summary: Toggle favorite status
      operationId: toggleFavorite
      security:
      - HTTPBearer: []
      parameters:
      - name: summary_id
        in: path
        required: true
        schema:
          type: integer
      tags:
      - Summaries
      responses:
        '200':
          description: Favorite status updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ToggleFavoriteResponseEnvelope'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/summaries/{summary_id}/audio:
    post:
      summary: Generate Summary Audio
      description: Trigger audio generation for a summary. Returns immediately with status if already cached, otherwise generates on-demand.
      operationId: generate_summary_audio_v1_summaries_summary_id_audio_post
      security:
      - HTTPBearer: []
      parameters:
      - name: summary_id
        in: path
        required: true
        schema:
          type: integer
      - name: source_field
        in: query
        required: false
        schema:
          type: string
          enum:
          - summary_250
          - summary_1000
          - tldr
          default: summary_1000
      tags:
      - Summaries
      responses:
        '200':
          description: Audio generation result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SummaryAudioResponseEnvelope'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '501':
          description: TTS not enabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'
    get:
      summary: Get Summary Audio
      description: Stream or download the generated audio file for a summary. Returns audio/mpeg.
      operationId: get_summary_audio_v1_summaries_summary_id_audio_get
      security:
      - HTTPBearer: []
      parameters:
      - name: summary_id
        in: path
        required: true
        schema:
          type: integer
      tags:
      - Summaries
      responses:
        '200':
          description: Audio file stream
          content:
            audio/mpeg:
              schema:
                type: string
                format: binary
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '501':
          description: TTS not enabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/proxy/image:
    get:
      summary: Proxy Image
      description: Proxy an image from a remote URL to bypass CORS/hotlink protection.
      operationId: proxyImage
      parameters:
      - name: url
        in: query
        required: true
        schema:
          type: string
        description: URL of the image to proxy
      tags:
      - Proxy
      responses:
        '200':
          description: Image content stream
          content:
            image/*:
              schema:
                type: string
                format: binary
        '400':
          $ref: '#/components/responses/ValidationError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/notifications/device:
    post:
      tags:
      - Notifications
      summary: Register mobile device
      description: Register a device token (FCM/APNS) for push notifications.
      operationId: registerDevice
      security:
      - HTTPBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeviceRegistrationPayload'
      responses:
        '200':
          description: Device registered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BaseResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/collections:
    get:
      summary: List collections
      operationId: getCollections
      security:
      - HTTPBearer: []
      tags:
      - Collections
      parameters:
      - name: parent_id
        in: query
        required: false
        schema:
          title: Parent Id
          type: integer
          minimum: 1
          nullable: true
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 200
          minimum: 1
          default: 20
          title: Limit
      - name: offset
        in: query
        required: false
        schema:
          type: integer
          minimum: 0
          default: 0
          title: Offset
      responses:
        '200':
          description: List of user collections
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CollectionListResponseEnvelope'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      summary: Create collection
      operationId: createCollection
      security:
      - HTTPBearer: []
      tags:
      - Collections
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CollectionCreateRequest'
      responses:
        '200':
          description: Collection created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CollectionResponseEnvelope'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/collections/{collection_id}:
    get:
      summary: Get collection details
      operationId: getCollection
      security:
      - HTTPBearer: []
      parameters:
      - name: collection_id
        in: path
        required: true
        schema:
          type: integer
      tags:
      - Collections
      responses:
        '200':
          description: Collection details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CollectionResponseEnvelope'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalServerError'
    patch:
      summary: Update collection
      operationId: updateCollection
      security:
      - HTTPBearer: []
      parameters:
      - name: collection_id
        in: path
        required: true
        schema:
          type: integer
      tags:
      - Collections
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CollectionUpdateRequest'
      responses:
        '200':
          description: Collection updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CollectionResponseEnvelope'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      summary: Delete collection
      operationId: deleteCollection
      security:
      - HTTPBearer: []
      parameters:
      - name: collection_id
        in: path
        required: true
        schema:
          type: integer
      tags:
      - Collections
      responses:
        '200':
          description: Collection deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/collections/{collection_id}/items:
    post:
      summary: Add item to collection
      operationId: addCollectionItem
      security:
      - HTTPBearer: []
      parameters:
      - name: collection_id
        in: path
        required: true
        schema:
          type: integer
      tags:
      - Collections
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CollectionItemCreateRequest'
      responses:
        '200':
          description: Item added
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalServerError'
    get:
      summary: List items in collection
      operationId: listCollectionItems
      security:
      - HTTPBearer: []
      parameters:
      - name: collection_id
        in: path
        required: true
        schema:
          type: integer
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 200
          minimum: 1
          default: 50
      - name: offset
        in: query
        required: false
        schema:
          type: integer
          minimum: 0
          default: 0
      tags:
      - Collections
      responses:
        '200':
          description: Items listed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CollectionItemsResponseEnvelope'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/collections/{collection_id}/items/{summary_id}:
    delete:
      summary: Remove item from collection
      operationId: removeCollectionItem
      security:
      - HTTPBearer: []
      parameters:
      - name: collection_id
        in: path
        required: true
        schema:
          type: integer
      - name: summary_id
        in: path
        required: true
        schema:
          type: integer
      tags:
      - Collections
      responses:
        '200':
          description: Item removed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/collections/tree:
    get:
      summary: List collections as tree
      operationId: getCollectionTree
      security:
      - HTTPBearer: []
      tags:
      - Collections
      parameters:
      - name: max_depth
        in: query
        required: false
        schema:
          type: integer
          default: 3
      responses:
        '200':
          description: Collection tree
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CollectionTreeResponseEnvelope'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/collections/{collection_id}/acl:
    get:
      summary: Get collection ACL
      operationId: getCollectionAcl
      security:
      - HTTPBearer: []
      parameters:
      - name: collection_id
        in: path
        required: true
        schema:
          type: integer
      tags:
      - Collections
      responses:
        '200':
          description: ACL entries
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CollectionAclResponseEnvelope'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/collections/{collection_id}/share:
    post:
      summary: Add collaborator
      operationId: addCollectionCollaborator
      security:
      - HTTPBearer: []
      parameters:
      - name: collection_id
        in: path
        required: true
        schema:
          type: integer
      tags:
      - Collections
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CollectionShareRequest'
      responses:
        '200':
          description: Collaborator added
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/collections/{collection_id}/share/{target_user_id}:
    delete:
      summary: Remove collaborator
      operationId: removeCollectionCollaborator
      security:
      - HTTPBearer: []
      parameters:
      - name: collection_id
        in: path
        required: true
        schema:
          type: integer
      - name: target_user_id
        in: path
        required: true
        schema:
          type: integer
      tags:
      - Collections
      responses:
        '200':
          description: Collaborator removed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/collections/{collection_id}/invite:
    post:
      summary: Create invite token
      operationId: createCollectionInvite
      security:
      - HTTPBearer: []
      parameters:
      - name: collection_id
        in: path
        required: true
        schema:
          type: integer
      tags:
      - Collections
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CollectionInviteRequest'
      responses:
        '200':
          description: Invite created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CollectionInviteResponseEnvelope'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/collections/invites/{token}/accept:
    post:
      summary: Accept collection invite
      operationId: acceptCollectionInvite
      security:
      - HTTPBearer: []
      parameters:
      - name: token
        in: path
        required: true
        schema:
          type: string
      tags:
      - Collections
      responses:
        '200':
          description: Invite accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/collections/{collection_id}/reorder:
    post:
      summary: Reorder child collections
      operationId: reorderCollections
      security:
      - HTTPBearer: []
      parameters:
      - name: collection_id
        in: path
        required: true
        schema:
          type: integer
      tags:
      - Collections
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CollectionReorderRequest'
      responses:
        '200':
          description: Reordered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CollectionReorderResponseEnvelope'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/collections/{collection_id}/items/reorder:
    post:
      summary: Reorder collection items
      operationId: reorderCollectionItems
      security:
      - HTTPBearer: []
      parameters:
      - name: collection_id
        in: path
        required: true
        schema:
          type: integer
      tags:
      - Collections
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CollectionItemReorderRequest'
      responses:
        '200':
          description: Items reordered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CollectionReorderResponseEnvelope'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/collections/{collection_id}/move:
    post:
      summary: Move collection to another parent
      operationId: moveCollection
      security:
      - HTTPBearer: []
      parameters:
      - name: collection_id
        in: path
        required: true
        schema:
          type: integer
      tags:
      - Collections
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CollectionMoveRequest'
      responses:
        '200':
          description: Collection moved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CollectionMoveResponseEnvelope'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/collections/{collection_id}/items/move:
    post:
      summary: Move items to another collection
      operationId: moveCollectionItems
      security:
      - HTTPBearer: []
      parameters:
      - name: collection_id
        in: path
        required: true
        schema:
          type: integer
      tags:
      - Collections
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CollectionItemMoveRequest'
      responses:
        '200':
          description: Items moved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CollectionItemsMoveResponseEnvelope'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
