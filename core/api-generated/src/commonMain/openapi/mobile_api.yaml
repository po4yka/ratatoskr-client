    DeviceFlowStartResponse:
      type: object
      required:
      - user_code
      - verification_uri
      - device_code
      - interval
      - expires_in
      properties:
        user_code:
          type: string
          description: Short user-visible code to enter at verification_uri.
        verification_uri:
          type: string
          description: URL where the user enters the user_code.
        device_code:
          type: string
          description: Long device code; pass back to /v1/auth/github/device/poll.
        interval:
          type: integer
          description: Minimum interval (seconds) between polls.
        expires_in:
          type: integer
          description: Seconds until the device_code expires.
      title: DeviceFlowStartResponse
    DeviceFlowPollRequest:
      type: object
      required:
      - device_code
      properties:
        device_code:
          type: string
          minLength: 20
          maxLength: 200
      title: DeviceFlowPollRequest
    DeviceFlowPollResponse:
      type: object
      required:
      - status
      properties:
        status:
          type: string
          enum:
          - pending
          - slow_down
          - expired
          - ok
          - denied
        login:
          type: string
          nullable: true
        github_user_id:
          type: integer
          nullable: true
        auth_method:
          type: string
          nullable: true
          description: Always "oauth_device" on success.
        integration_status:
          type: string
          nullable: true
      title: DeviceFlowPollResponse
