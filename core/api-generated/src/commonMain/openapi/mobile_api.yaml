        schema:
          title: Is Favorited
          type: boolean
          nullable: true
      - name: lang
        in: query
        required: false
        schema:
          title: Lang
          type: string
          pattern: ^(en|ru|auto)$
          nullable: true
      - name: start_date
        in: query
