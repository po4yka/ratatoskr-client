  /v1/search/repositories:
    get:
      tags:
      - Search
      summary: Search Repositories
      description: Semantic search over GitHub repositories using Qdrant embeddings, filtered by optional language/topic/source/starred flags.
      operationId: search_repositories_v1_search_repositories_get
      security:
      - HTTPBearer: []
      parameters:
      - name: q
        in: query
        required: true
        schema:
          type: string
          minLength: 2
          maxLength: 200
          title: Q
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 100
          minimum: 1
          default: 20
          title: Limit
      - name: offset
        in: query
        required: false
        schema:
          type: integer
          minimum: 0
          default: 0
          title: Offset
      - name: min_similarity
        in: query
        required: false
        schema:
          type: number
          maximum: 1.0
          minimum: 0.0
          default: 0.2
          title: Min Similarity
      - name: languages
        in: query
        required: false
        schema:
          title: Languages
          type: array
          items:
            type: string
          nullable: true
      - name: topics
        in: query
        required: false
        schema:
          title: Topics
          type: array
          items:
            type: string
          nullable: true
      - name: is_starred
        in: query
        required: false
        schema:
          title: Is Starred
          type: boolean
          nullable: true
      - name: source
        in: query
        required: false
        schema:
          title: Source
          type: string
          enum:
          - manual
          - starred
          nullable: true
      responses:
        '200':
          description: Repository search results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RepositorySearchResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalServerError'
components:
  securitySchemes:
