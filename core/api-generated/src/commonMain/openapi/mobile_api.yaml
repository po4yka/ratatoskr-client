  /v1/requests/{request_id}/stream:
    get:
      summary: Stream summary progress events as Server-Sent Events
      description: 'Returns a Server-Sent Events (SSE) stream of progress events for the given

        request. The connection stays open until the underlying summarization reaches

        a terminal state (''done'' or ''error'') or the client disconnects.


        Events use the standard SSE format. The ''event:'' field is one of

        ''phase'' | ''section'' | ''done'' | ''error''; the ''data:'' field is a JSON object

        whose ''kind'' matches the event field, with payload schemas as documented

        below (StreamPhaseEvent, StreamSectionEvent, StreamDoneEvent, StreamErrorEvent).

        The server emits a comment-line '': keepalive'' heartbeat every 15s on idle.

        '
      operationId: streamRequest
      tags:
      - Streams
      security:
      - HTTPBearer: []
      parameters:
      - name: request_id
        in: path
        required: true
        schema:
          type: integer
        description: Numeric request id; the authenticated user must own this request.
      responses:
        '200':
          description: SSE stream open. See StreamPhaseEvent / StreamSectionEvent / StreamDoneEvent / StreamErrorEvent for payload shapes.
          content:
            text/event-stream:
              schema:
                type: string
                description: 'Server-Sent Events stream. Each event is one of:

                  - phase  -> StreamPhaseEvent

                  - section -> StreamSectionEvent

                  - done    -> StreamDoneEvent

                  - error   -> StreamErrorEvent

                  '
        '401':
          description: Missing or invalid bearer token.
        '403':
          description: Authenticated user does not own this request.
        '404':
          description: Request id does not exist.
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/aggregations:
    post:
      tags:
      - Aggregations
      summary: Create Aggregation Bundle
      description: Execute mixed-source aggregation for one submitted bundle of 1-25 URL items. This endpoint is blocking and returns the final persisted session snapshot on success.
      operationId: create_aggregation_bundle_v1_aggregations_post
      security:
      - HTTPBearer: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                items:
                  type: array
                  minItems: 1
                  maxItems: 25
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                        const: url
                        default: url
                      url:
                        type: string
                        format: uri
                        maxLength: 2048
                      source_kind_hint:
                        type: string
                        nullable: true
                        enum:
                        - x_post
                        - x_article
                        - threads_post
                        - instagram_post
                        - instagram_carousel
                        - instagram_reel
                        - web_article
                        - telegram_post
                        - youtube_video
                      metadata:
                        type: object
                        nullable: true
                        additionalProperties: true
                    required:
                    - url
                lang_preference:
                  type: string
                  enum:
                  - auto
                  - en
                  - ru
                  default: auto
                metadata:
                  type: object
                  nullable: true
                  additionalProperties: true
              required:
              - items
        required: true
      responses:
        '200':
          description: Aggregation bundle completed or partially completed
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    const: true
                  data:
                    type: object
                    properties:
                      session:
                        type: object
                        properties:
                          sessionId:
                            type: integer
                          correlationId:
                            type: string
                          status:
                            type: string
                          sourceType:
                            type: string
                          successfulCount:
                            type: integer
                          failedCount:
                            type: integer
                          duplicateCount:
                            type: integer
                          processingTimeMs:
                            type: integer
                            nullable: true
                          queuedAt:
                            type: string
                            nullable: true
                          startedAt:
                            type: string
                            nullable: true
                          completedAt:
                            type: string
                            nullable: true
