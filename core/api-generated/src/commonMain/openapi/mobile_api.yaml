      - type: object
        required:
        - data
        properties:
          data:
            $ref: '#/components/schemas/AuthTokens'
    SecretLoginRequest:
      type: object
      description: Request body for secret-key based authentication.
      required:
      - user_id
      - client_id
      - secret
      properties:
        user_id:
          type: integer
          description: User ID (must be whitelisted in ALLOWED_USER_IDS).
        client_id:
          type: string
          minLength: 1
          maxLength: 100
          description: Client application identifier.
        secret:
          type: string
          minLength: 8
          description: Secret key for authentication (minimum 8 characters).
        username:
          type: string
          nullable: true
          description: Optional username to associate with the session.
    CredentialsLoginRequest:
      type: object
      description: Request body for nickname/email + password login.
      required:
      - identifier
      - password
      - client_id
      properties:
        identifier:
          type: string
          minLength: 1
          maxLength: 256
          description: 'Nickname or email. Presence of `@` routes to the email branch;

            otherwise treated as a nickname. Lookup is canonicalized

            (lowercase + trim) before hitting the credentials table.

            '
        password:
          type: string
          minLength: 1
          maxLength: 4096
          description: Plaintext password (HMAC-peppered + argon2id-verified server-side).
        remember_me:
          type: boolean
          default: false
          description: 'True → 30-day refresh TTL, web client persists tokens in localStorage.

            False → short-lived refresh (default 12h), refresh cookie issued as a

            session cookie (no Max-Age) so it vanishes on browser close.

            '
        client_id:
          type: string
          minLength: 1
          maxLength: 100
          description: Client application identifier (must be in ALLOWED_CLIENT_IDS if that env var is set).
    ChangePasswordRequest:
      type: object
      description: Request body for owner-only password change.
      required:
      - current_password
      - new_password
      properties:
        current_password:
          type: string
          minLength: 1
          maxLength: 4096
          description: Current plaintext password (verified before update).
        new_password:
          type: string
          minLength: 1
          maxLength: 4096
          description: New plaintext password (validated against credentials_password_min_length).
    SecretKeyCreateRequest:
      type: object
      required:
      - user_id
      - client_id
      properties:
        user_id:
          type: integer
        client_id:
          type: string
          minLength: 1
          maxLength: 100
        label:
          type: string
          maxLength: 200
          nullable: true
        description:
          type: string
          maxLength: 500
          nullable: true
        expires_at:
          type: string
          format: date-time
          nullable: true
        secret:
          type: string
          nullable: true
          description: Optional client-provided secret; if omitted server generates
        username:
          type: string
          nullable: true
    SecretKeyRotateRequest:
      type: object
      properties:
        label:
          type: string
          maxLength: 200
          nullable: true
        description:
          type: string
          maxLength: 500
          nullable: true
        expires_at:
          type: string
          format: date-time
          nullable: true
        secret:
          type: string
          nullable: true
          description: Optional client-provided secret; if omitted server generates
    SecretKeyRevokeRequest:
