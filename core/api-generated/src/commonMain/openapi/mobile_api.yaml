      - repo_count
      properties:
        is_connected:
          type: boolean
        auth_method:
          type: string
          nullable: true
          description: One of "pat" or "oauth_device" when connected.
        github_login:
          type: string
          nullable: true
        github_user_id:
          type: integer
          nullable: true
        status:
          type: string
          nullable: true
