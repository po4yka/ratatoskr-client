  schemas:
    Meta:
      type: object
      description: Response metadata for observability and pagination.
      required:
      - correlation_id
      - timestamp
      - version
      - api_version
      properties:
        correlation_id:
          type: string
          description: Request correlation ID for debugging (always present, may be empty string).
        timestamp:
          type: string
          format: date-time
          description: ISO 8601 response timestamp.
        version:
          type: string
          description: App / build version (changes every deploy). Sourced from APP_VERSION env var.
        api_version:
          type: string
          description: 'API contract semver. Distinct from `version` — bumps only on breaking contract

            changes (response shape, request shape, routing surface). Mobile / CLI clients

            should pin against this value and refuse to upgrade major versions blindly.

            '
        build:
          type: string
          nullable: true
          description: Build identifier (if available).
        pagination:
          $ref: '#/components/schemas/Pagination'
        debug:
          type: object
          nullable: true
          description: Debug information (only in development mode).
    Pagination:
      type: object
      description: Pagination metadata for list responses.
      required:
      - total
      - limit
      - offset
      - hasMore
      properties:
        total:
          type: integer
          description: Total number of items matching the query.
        limit:
          type: integer
          description: Maximum items per page.
        offset:
          type: integer
          description: Current offset from start.
        hasMore:
          type: boolean
          description: Whether more items are available.
        nextCursor:
          type: integer
          nullable: true
          description: Cursor for next page (if using cursor-based pagination).
    BaseSuccessResponse:
      type: object
      required:
      - success
      - meta
      properties:
        success:
          type: boolean
          const: true
        meta:
          $ref: '#/components/schemas/Meta'
    ErrorObject:
      type: object
      description: Structured error details for programmatic handling.
      required:
      - code
      - errorType
      - message
      - retryable
      - correlation_id
      properties:
        code:
          type: string
          description: Machine-readable error code for programmatic handling.
          enum:
          - VALIDATION_ERROR
          - UNAUTHORIZED
          - FORBIDDEN
          - NOT_FOUND
          - CONFLICT
          - RATE_LIMIT_EXCEEDED
          - SESSION_EXPIRED
          - TOKEN_EXPIRED
          - TOKEN_INVALID
          - TOKEN_REVOKED
          - TOKEN_WRONG_TYPE
          - REFRESH_RATE_LIMITED
          - SYNC_SESSION_EXPIRED
          - SYNC_SESSION_NOT_FOUND
          - SYNC_SESSION_FORBIDDEN
          - SYNC_NO_CHANGES
          - SYNC_CONFLICT
          - SYNC_INVALID_ENTITY
          - SYNC_ENTITY_NOT_FOUND
          - INTERNAL_ERROR
          - DATABASE_ERROR
          - EXTERNAL_API_ERROR
          - PROCESSING_ERROR
          - AUTH_SERVICE_UNAVAILABLE
          - CONFIGURATION_ERROR
          - FEATURE_DISABLED
        errorType:
          type: string
          description: Error category for client-side handling logic.
          enum:
          - authentication
          - authorization
          - validation
          - not_found
          - conflict
          - rate_limit
          - external_service
          - sync
          - internal
          - configuration
        message:
          type: string
          description: Human-readable error message.
        retryable:
          type: boolean
          description: Whether the client should retry the request.
          default: false
        details:
          type: object
          nullable: true
          description: Additional error context (field errors, resource IDs, etc.).
        correlation_id:
          type: string
          description: Request correlation ID for debugging (always present).
        retry_after:
          type: integer
          nullable: true
          description: Seconds to wait before retrying (for rate limit errors).
    ErrorResponse:
      type: object
      required:
      - success
      - error
      - meta
      properties:
        success:
          type: boolean
          const: false
        error:
          $ref: '#/components/schemas/ErrorObject'
        meta:
          $ref: '#/components/schemas/Meta'
    AuthTokens:
      type: object
      required:
      - access_token
      - refresh_token
      - token_type
      - expires_in
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        token_type:
          type: string
          enum:
